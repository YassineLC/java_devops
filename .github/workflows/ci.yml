name: CI - Build and Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  security-events: write
  actions: read
  checks: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Tests with Coverage
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            gradle:8.13-jdk21-jammy \
            gradle test jacocoTestReport

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            build/test-results/**/*.xml

      - name: Coverage Summary
        if: always()
        run: |
          XML=build/reports/jacoco/test/jacocoTestReport.xml
          if [ ! -f "$XML" ]; then echo "No JaCoCo report found"; exit 0; fi
          missed=$(grep -o 'missed="[0-9]*"' "$XML" | head -1 | grep -o '[0-9]*')
          covered=$(grep -o 'covered="[0-9]*"' "$XML" | head -1 | grep -o '[0-9]*')
          total=$((missed + covered))
          if [ $total -gt 0 ]; then
            pct=$(( covered * 100 / total ))
          else
            pct=0
          fi
          echo "## Code Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Instructions covered | $covered / $total |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | **$pct%** |" >> $GITHUB_STEP_SUMMARY

      - name: Upload JaCoCo HTML report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: build/reports/jacoco/test/html/
          retention-days: 7

      - name: SonarCloud Analysis
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            gradle:8.13-jdk21-jammy \
            gradle sonar -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

      - name: Build Docker image
        run: docker build -t java_devops:latest .
